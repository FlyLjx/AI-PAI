name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build:web
      - run: npm run build:admin

      - uses: actions/setup-go@v5
        with:
          go-version-file: go-server/go.mod
          cache-dependency-path: go-server/go.sum
      - name: Test Go
        working-directory: go-server
        run: go test ./...
      - name: Build Go
        working-directory: go-server
        env:
          BUILD_VERSION: build-${{ github.run_number }}
          BUILD_COMMIT: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X aipi-go/internal/build.Version=$BUILD_VERSION -X aipi-go/internal/build.Commit=$BUILD_COMMIT -X aipi-go/internal/build.Time=$BUILD_TIME"
          CGO_ENABLED=0 go build -trimpath -ldflags "$LDFLAGS" -o ../ai-pai-api ./cmd/ai-pai

      - name: Build images
        env:
          BUILD_VERSION: build-${{ github.run_number }}
          BUILD_COMMIT: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=$BUILD_VERSION \
            -t ghcr.io/flyljx/ai-pai-web:ci .
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=$BUILD_VERSION \
            --build-arg BUILD_VERSION=$BUILD_VERSION \
            --build-arg BUILD_COMMIT=$BUILD_COMMIT \
            -f Dockerfile.admin \
            -t ghcr.io/flyljx/ai-pai-admin:ci .
          docker build \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            --label org.opencontainers.image.version=$BUILD_VERSION \
            --build-arg BUILD_VERSION=$BUILD_VERSION \
            --build-arg BUILD_COMMIT=$BUILD_COMMIT \
            --build-arg BUILD_TIME=$BUILD_TIME \
            -t ghcr.io/flyljx/ai-pai-api:ci ./go-server

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images
        if: github.event_name != 'pull_request'
        env:
          BUILD_VERSION: build-${{ github.run_number }}
        run: |
          for image in web admin api; do
            docker tag ghcr.io/flyljx/ai-pai-$image:ci ghcr.io/flyljx/ai-pai-$image:latest
            docker tag ghcr.io/flyljx/ai-pai-$image:ci ghcr.io/flyljx/ai-pai-$image:${{ github.sha }}
            docker tag ghcr.io/flyljx/ai-pai-$image:ci ghcr.io/flyljx/ai-pai-$image:$BUILD_VERSION
            docker push ghcr.io/flyljx/ai-pai-$image:latest
            docker push ghcr.io/flyljx/ai-pai-$image:${{ github.sha }}
            docker push ghcr.io/flyljx/ai-pai-$image:$BUILD_VERSION
          done

      - name: Publish build version
        if: github.event_name != 'pull_request'
        run: |
          echo "### AI-PAI build-${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Images: web, admin, api" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ai-pai-api-linux-amd64-build-${{ github.run_number }}
          path: ai-pai-api
